<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Portfolio in WebDev</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Farro:wght@400;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      background-color: #ffcce0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .font-italianno {
      font-family: 'Italianno', cursive;
      letter-spacing: 2px;
      color: #765d6c;
    }

    .font-farro {
      font-family: 'Farro', sans-serif;
      letter-spacing: 1px;
      color: #79626f;
    }

    .title-box {
      padding-left: 100px;
    }

    .name {
      font-size: 1.5rem;
      font-weight: bold;
      color: #9b6e6e;
      margin-bottom: 1rem;
    }

    .btn {
      width: 200px;
      height: 50px;
      background-color: #ff99cc;
      border-radius: 20px;
      border: none;
      font-size: 20px;
      color: black;
      font-weight: 300;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #e68abf;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.4;
      animation: float 15s infinite linear;
      z-index: -1;
    }

    .circle:nth-child(1) {
      width: 80px;
      height: 80px;
      background: #ff99cc;
      top: 20%;
      left: 10%;
      animation-duration: 18s;
    }

    .circle:nth-child(2) {
      width: 120px;
      height: 120px;
      background: #e68abf;
      top: 50%;
      left: 80%;
      animation-duration: 22s;
    }

    .circle:nth-child(3) {
      width: 60px;
      height: 60px;
      background: #9b6e6e;
      top: 70%;
      left: 30%;
      animation-duration: 20s;
    }

    .circle:nth-child(4) {
      width: 100px;
      height: 100px;
      background: #765d6c;
      top: 40%;
      left: 60%;
      animation-duration: 25s;
    }

    .circle:nth-child(5) {
      width: 150px;
      height: 150px;
      background: #ffb3d9;
      top: 10%;
      left: 50%;
      animation-duration: 28s;
    }

    .circle:nth-child(6) {
      width: 90px;
      height: 90px;
      background: #d98cb3;
      top: 80%;
      left: 15%;
      animation-duration: 24s;
    }

    .circle:nth-child(7) {
      width: 70px;
      height: 70px;
      background: #c080a1;
      top: 30%;
      left: 75%;
      animation-duration: 26s;
    }

    .circle:nth-child(8) {
      width: 110px;
      height: 110px;
      background: #a3668f;
      top: 60%;
      left: 5%;
      animation-duration: 30s;
    }

    .circle:nth-child(9) {
      width: 130px;
      height: 130px;
      background: #ff80bf;
      top: 15%;
      left: 25%;
      animation-duration: 27s;
    }

    .circle:nth-child(10) {
      width: 75px;
      height: 75px;
      background: #b36699;
      top: 65%;
      left: 70%;
      animation-duration: 21s;
    }

    .circle:nth-child(11) {
      width: 95px;
      height: 95px;
      background: #cc6699;
      top: 85%;
      left: 40%;
      animation-duration: 29s;
    }

    .circle:nth-child(12) {
      width: 140px;
      height: 140px;
      background: #996680;
      top: 35%;
      left: 5%;
      animation-duration: 32s;
    }


    @keyframes float {
      0% {
        transform: translateY(0) translateX(0);
      }

      50% {
        transform: translateY(-50px) translateX(30px);
      }

      100% {
        transform: translateY(0) translateX(0);
      }
    }
  </style>
</head>

<body>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-6 text-center text-md-start mb-md-0 title-box">
        <h1 class="display-1 fw-bold">
          <span class="font-italianno">My Portfolio in</span>
          <span class="font-farro p-4">WebDev</span>
        </h1>
      </div>
      <div class="col-md-6 text-center">
        <img src="2.jpg" alt="Profile Picture" class="rounded-circle"
          style="width: 400px; height: 400px; object-fit: cover;" />
        <div class="name mt-3">Leanne A. Lamano</div>

        <div class="buttons">
          <button class="btn" onclick="window.location.href='details.html'">Details</button>
          <button class="btn" onclick="window.location.href='projects.html'">Projects</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
